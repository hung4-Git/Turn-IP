<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>岡山高中 80 週年校慶報名入口</title>
    <style>
        body { 
            font-family: -apple-system, "Helvetica Neue", "STHeitiTC-Light", sans-serif; 
            background: #000000; 
            margin: 0; 
            color: white;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* 浮現動畫 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #ios-guide {
            width: 100%;
            height: 100vh;
            display: none; 
            flex-direction: column;
            align-items: center;
            padding-top: 70px;
            animation: fadeIn 0.8s ease-out forwards;
            box-sizing: border-box;
        }

        .arrow-img { 
            position: absolute; 
            top: 10px; 
            right: 25px; 
            width: 75px; 
            filter: invert(1);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-12px); }
            60% { transform: translateY(-6px); }
        }

        .instructions { 
            text-align: center; 
            padding: 0 30px; 
            line-height: 2;
        }

        .title-sub { font-size: 1.1em; opacity: 0.7; margin-bottom: 5px; }
        .title-main { font-size: 1.6em; font-weight: bold; margin-bottom: 35px; color: #fff; }

        .step { font-size: 1.2em; margin: 15px 0; }
        .highlight { 
            color: #ffeb3b; 
            font-weight: bold; 
            font-size: 1.3em; 
            text-shadow: 0 0 12px rgba(255, 235, 59, 0.4);
            padding: 0 4px;
        }

        .footer-note {
            margin-top: 50px;
            font-size: 0.9em;
            color: #aaa;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-manual {
            margin-top: 30px;
            display: inline-block;
            color: #666;
            text-decoration: underline;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <div id="ios-guide">
        <img src="https://img.icons8.com/m_outlined/512/FFFFFF/up-right.png" class="arrow-img">
        
        <div class="instructions">
            <div class="title-sub">岡山高中 80 週年校慶</div>
            <div class="title-main">報名系統載入指引</div>
            
            <div class="step">1. 點擊右上角 <span class="highlight">「 ••• 」</span></div>
            <div class="step">2. 選擇 <span class="highlight">「使用外部瀏覽器中開啟」</span></div>
            
            <div class="footer-note">
                💡 由於 Facebook 瀏覽器限制，請切換至 Safari 或 Chrome 瀏覽器，以確保報名資料能正確提交。
            </div>

            <a href="https://script.google.com/macros/s/AKfycbxjpmVSbnpu6qXGLz90pSZauo_BCgBNUlMBHeXudcfU-OW-Y43E1zhZ4KSplIpy_p48DA/exec" 
               class="btn-manual">若您已在外部瀏覽器，請點此進入</a>
        </div>
    </div>

    <script>
        // 更新後的 GAS 網址
        var gasUrl = "https://script.google.com/macros/s/AKfycbxjpmVSbnpu6qXGLz90pSZauo_BCgBNUlMBHeXudcfU-OW-Y43E1zhZ4KSplIpy_p48DA/exec";
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        
        // 判斷是否為行動裝置
        var isMobile = /Android|iPhone|iPad|iPod/i.test(ua);
        // 判斷是否在 FB 或 Line 內
        var isFB = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);
        var isLine = (ua.indexOf("Line") > -1);

        if (isMobile && (isFB || isLine)) {
            // 在 FB/Line 內：顯示黑色指引，不自動跳轉
            document.getElementById('ios-guide').style.display = 'flex';
        } else {
            // 在外部瀏覽器：直接進入表單
            window.location.replace(gasUrl);
        }
    </script>
</body>
</html>
