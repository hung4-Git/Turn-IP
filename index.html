<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>岡山高中 80 週年校慶報名系統</title>
    <style>
        body { 
            font-family: -apple-system, "Helvetica Neue", sans-serif; 
            background: #000000; /* 背景全黑，強調提示內容 */
            margin: 0; 
            color: white;
            display: flex;
            justify-content: center;
        }

        /* 浮現動畫 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #ios-guide {
            width: 100%;
            height: 100vh;
            display: none; /* 初始隱藏，由 JS 判斷後開啟 */
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            animation: fadeIn 0.8s ease-out forwards;
        }

        .arrow-img { 
            position: absolute; 
            top: 15px; 
            right: 25px; 
            width: 70px; 
            filter: invert(1);
            animation: bounce 2s infinite; /* 箭頭跳動動畫 */
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        .instructions { 
            text-align: center; 
            padding: 20px; 
            line-height: 2;
        }

        .highlight { 
            color: #ffeb3b; 
            font-weight: bold; 
            font-size: 1.4em; 
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.5);
        }

        .btn-retry {
            margin-top: 40px;
            padding: 15px 30px;
            background: #333;
            color: #aaa;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.9em;
            border: 1px solid #555;
        }
    </style>
</head>
<body>

    <div id="ios-guide">
        <img src="https://img.icons8.com/m_outlined/512/FFFFFF/up-right.png" class="arrow-img">
        <div class="instructions">
            <p style="font-size: 1.1em; opacity: 0.8;">岡山高中 80 週年校慶</p>
            <p style="font-size: 1.5em; font-weight: bold; margin-bottom: 30px;">報名系統載入指引</p>
            
            <p>1. 請點擊右上角 <span class="highlight">「 ••• 」</span></p>
            <p>2. 選擇 <span class="highlight">「在瀏覽器中開啟」</span></p>
            
            <p style="margin-top: 40px; font-size: 0.9em; color: #bbb;">
                ※ 這是為了確保報名表單能正確讀取資料庫。<br>
                如果您已經在瀏覽器中，請直接點擊下方連結。
            </p>

            <a href="https://script.google.com/macros/s/AKfycbx5gDmMbNw7ZFsnHVJWqz3Ln4YflWiwBOk5GIXgvIyIe5wuXwnbnKIfj44a6rrlPC47/exec" 
               class="btn-retry">強制進入表單 (不建議)</a>
        </div>
    </div>

    <script>
        var gasUrl = "https://script.google.com/macros/s/AKfycbx5gDmMbNw7ZFsnHVJWqz3Ln4YflWiwBOk5GIXgvIyIe5wuXwnbnKIfj44a6rrlPC47/exec";
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        
        // 判斷是否為 iOS 的行動裝置環境
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        var isFB = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);
        var isLine = (ua.indexOf("Line") > -1);

        if (isIOS && (isFB || isLine)) {
            // 在 FB 內：永久顯示訊息
            document.getElementById('ios-guide').style.display = 'flex';
        } else {
            // 在外部瀏覽器（Safari/Chrome）：直接秒跳轉到 GAS
            window.location.replace(gasUrl);
        }
    </script>
</body>
</html>
