<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>岡山高中 80 週年校慶報名入口</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* 針對 iOS FB 的黑色遮罩 */
        #ios-guide {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 9999; color: white;
        }
        .arrow-img { position: absolute; top: 10px; right: 20px; width: 60px; filter: invert(1); }
        .instructions { text-align: center; margin-top: 100px; padding: 20px; font-size: 1.2em; line-height: 1.8; }
        .highlight { color: #ffeb3b; font-weight: bold; font-size: 1.3em; }

        .card { background: white; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 350px; width: 90%; text-align: center; }
        .btn { display: block; background: #1565c0; color: white; padding: 18px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="ios-guide">
        <img src="https://img.icons8.com/m_outlined/512/FFFFFF/up-right.png" class="arrow-img">
        <div class="instructions">
            <p>偵測到您正在使用 <span class="highlight">iOS 裝置</span></p>
            <p>請點擊右上角 <span class="highlight">「...」</span></p>
            <p>選擇 <span class="highlight">「在瀏覽器中開啟」</span></p>
            <p>或是 <span class="highlight">「使用預設瀏覽器開啟」</span></p>
            <p style="font-size: 0.8em; color: #ccc; margin-top: 30px;">( 這樣才能正常顯示報名表內容喔！ )</p>
        </div>
    </div>

    <div id="main-content" class="card">
        <h2 style="color:#1565c0;">岡山高中 80 週年</h2>
        <p>歡迎報名校慶講座<br>系統載入中...</p>
        <a href="https://script.google.com/macros/s/AKfycbx5gDmMbNw7ZFsnHVJWqz3Ln4YflWiwBOk5GIXgvIyIe5wuXwnbnKIfj44a6rrlPC47/exec" 
           class="btn" id="manual-link">🚀 前往報名表</a>
    </div>

    <script>
        var gasUrl = "https://script.google.com/macros/s/AKfycbx5gDmMbNw7ZFsnHVJWqz3Ln4YflWiwBOk5GIXgvIyIe5wuXwnbnKIfj44a6rrlPC47/exec";
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        
        // 判斷是否為 iOS 的 FB 或 Line
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        var isFB = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);
        var isLine = (ua.indexOf("Line") > -1);

        if (isIOS && (isFB || isLine)) {
            // 在 iOS 的受限環境中：顯示黑色遮罩，隱藏主內容
            document.getElementById('ios-guide').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
        } else {
            // 如果已經在 Safari 或其他環境，直接跳轉到 GAS
            window.location.href = gasUrl;
        }
    </script>
</body>
</html>
